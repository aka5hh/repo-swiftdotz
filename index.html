<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SwiftDotz Global Co. sourcing and supply solutions worldwide"
    />
    <title>SwiftDotz Global Co.</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <a href="#home">Home</a>
      <a href="#whoweare">Who We Are</a>
      <div class="nav-item">
        <a href="#whatwedo">What We Do</a>
        <div class="dropdown">
          <a href="#sourcing">Sourcing</a>
          <a href="#supplying">Supplying</a>
          <a href="#consulting">Consulting</a>
        </div>
      </div>
      <a href="#contactus">Contact Us</a>
    </nav>

    <!-- SCROLL CONTAINER (scroll snap applied here, not body — fixes iOS Safari bugs) -->
    <main class="scroll-container">
      <!-- HERO -->
      <section class="hero">
        <!-- Bottom-left blue curved arrow -->
        <div class="arrow-blue">
          <svg
            aria-hidden="true"
            viewBox="0 0 300 300"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="blueGrad"
                x1="300"
                y1="0"
                x2="0"
                y2="300"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0%" stop-color="#4a90d9" />
                <stop offset="100%" stop-color="#1a3a6b" />
              </linearGradient>
            </defs>
            <path
              d="M 270 270 A 200 200 0 0 0 70 70"
              stroke="url(#blueGrad)"
              stroke-width="52"
              stroke-linecap="round"
              fill="none"
            />
            <polygon points="40,98  95,50  58,110" fill="#1a3a6b" />
          </svg>
        </div>

        <!-- Top-right green curved arrow -->
        <div class="arrow-green">
          <svg
            aria-hidden="true"
            viewBox="0 0 280 280"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="greenGrad"
                x1="0"
                y1="280"
                x2="280"
                y2="0"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0%" stop-color="#27ae60" />
                <stop offset="100%" stop-color="#2ecc71" />
              </linearGradient>
            </defs>
            <path
              d="M 10 10 A 200 200 0 0 1 220 220"
              stroke="url(#greenGrad)"
              stroke-width="52"
              stroke-linecap="round"
              fill="none"
            />
            <polygon points="248,192  196,248  190,185" fill="#27ae60" />
          </svg>
        </div>

        <!-- Logo -->
        <div class="logo-wrap">
          <div class="logo-text">
            <span class="swift">Swift</span><span class="dotz">Dotz</span>
          </div>
          <div class="tagline-row">
            <div class="divider"></div>
            <span class="tagline">Global Co.</span>
          </div>
        </div>
      </section>

      <!-- SOURCING SECTION -->
      <section class="sourcing-section" id="sourcing">
        <!-- Top-left blue arc -->
        <svg
          aria-hidden="true"
          class="sourcing-arc"
          viewBox="0 0 230 230"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient
              id="blueArcGrad"
              x1="0"
              y1="0"
              x2="230"
              y2="230"
              gradientUnits="userSpaceOnUse"
            >
              <stop offset="0%" stop-color="#4a90d9" />
              <stop offset="100%" stop-color="#1a3a6b" />
            </linearGradient>
          </defs>
          <path
            d="M 230 10 A 160 160 0 0 0 10 230"
            stroke="url(#blueArcGrad)"
            stroke-width="48"
            stroke-linecap="round"
            fill="none"
          />
        </svg>

        <!-- Text content -->
        <div class="sourcing-content" id="sourcing-content">
          <h1 class="sourcing-title">Sourcing</h1>
          <p class="sourcing-subtitle">
            Going far &amp; wide for the best and feasible solutions.
          </p>
          <a href="#" class="learn-more-btn">Learn More</a>
        </div>

        <!-- Airplane -->
        <div class="airplane-wrap" id="airplane-wrap">
          <svg
            aria-hidden="true"
            viewBox="0 0 1400 500"
            xmlns="http://www.w3.org/2000/svg"
            style="width: 100%; display: block"
          >
            <defs>
              <linearGradient id="planeGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#d8d8d8" />
                <stop offset="100%" stop-color="#a8a8a8" />
              </linearGradient>
              <linearGradient id="planeBodyGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e2e2e2" />
                <stop offset="60%" stop-color="#c5c5c5" />
                <stop offset="100%" stop-color="#a0a0a0" />
              </linearGradient>
            </defs>
            <ellipse
              cx="700"
              cy="310"
              rx="580"
              ry="72"
              fill="url(#planeBodyGrad)"
            />
            <path
              d="M 1280 310 Q 1380 310 1390 305 Q 1380 295 1280 290 Z"
              fill="#b8b8b8"
            />
            <path
              d="M 160 310 Q 140 160 220 120 Q 260 108 280 200 L 280 310 Z"
              fill="url(#planeGrad)"
            />
            <path
              d="M 180 320 Q 100 340 60 360 L 90 370 Q 140 355 200 338 Z"
              fill="#c0c0c0"
            />
            <path
              d="M 180 300 Q 100 280 60 260 L 90 255 Q 140 270 200 285 Z"
              fill="#c0c0c0"
            />
            <path
              d="M 650 330 Q 500 380 200 460 L 230 480 Q 540 420 680 368 Z"
              fill="url(#planeGrad)"
            />
            <path
              d="M 700 290 Q 560 270 350 250 L 355 265 Q 570 285 710 308 Z"
              fill="#c8c8c8"
            />
            <ellipse cx="500" cy="420" rx="62" ry="28" fill="#b0b0b0" />
            <ellipse cx="500" cy="420" rx="55" ry="22" fill="#c8c8c8" />
            <g fill="#888" opacity="0.5">
              <rect x="700" y="290" width="18" height="22" rx="4" />
              <rect x="740" y="290" width="18" height="22" rx="4" />
              <rect x="780" y="290" width="18" height="22" rx="4" />
              <rect x="820" y="290" width="18" height="22" rx="4" />
              <rect x="860" y="290" width="18" height="22" rx="4" />
              <rect x="900" y="292" width="18" height="22" rx="4" />
              <rect x="940" y="294" width="18" height="22" rx="4" />
              <rect x="980" y="296" width="18" height="22" rx="4" />
              <rect x="1020" y="297" width="18" height="22" rx="4" />
              <rect x="1060" y="298" width="18" height="22" rx="4" />
              <rect x="1100" y="299" width="18" height="22" rx="4" />
              <rect x="1140" y="300" width="18" height="22" rx="4" />
              <rect x="1180" y="300" width="18" height="22" rx="4" />
            </g>
            <ellipse
              cx="500"
              cy="448"
              rx="18"
              ry="14"
              fill="#2ecc71"
              opacity="0.7"
            />
          </svg>
        </div>
      </section>
    </main>
    <!-- end .scroll-container -->

    <script src="main.js"></script>
  </body>
</html>
